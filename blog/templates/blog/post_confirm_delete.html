{% extends "blog/base.html" %}
{% block content %}
<div class="card border-0 shadow-sm">
  <div class="card-body p-4">
    <h4 class="card-title text-danger border-bottom pb-3 mb-4">
      <i class="bi bi-exclamation-triangle me-2"></i>Delete Post
    </h4>
    <p class="mb-4">Are you sure you want to delete <strong>"{{ object.title }}"</strong>? This action cannot be undone.</p>
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button class="btn btn-danger" type="submit">
          <i class="bi bi-trash me-1"></i>Yes, Delete
        </button>
        <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary">
          <i class="bi bi-x-circle me-1"></i>Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
