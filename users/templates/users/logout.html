{% extends "blog/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm text-center">
      <div class="card-body p-5">
        <i class="bi bi-box-arrow-right display-4 text-muted mb-3"></i>
        <h4 class="card-title mb-2">You've been logged out</h4>
        <p class="text-muted mb-4">Thanks for visiting. See you again soon!</p>
        <a href="{% url 'login' %}" class="btn btn-brand">
          <i class="bi bi-box-arrow-in-right me-1"></i>Log In Again
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
