{% extends "blog/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-6">
    <div class="auth-card card">
      <div class="card-body">
        <div class="auth-header">
          <div class="auth-icon">
            <i class="bi bi-box-arrow-in-right"></i>
          </div>
          <h4 class="fw-700 mb-1">Welcome back</h4>
          <p class="text-muted small mb-0">Log in to your account to continue</p>
        </div>
        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="text-end mb-2">
            <a href="{% url 'password_reset' %}" class="text-muted small">
              <i class="bi bi-question-circle me-1"></i>Forgot password?
            </a>
          </div>
          <div class="d-grid mt-3">
            <button class="btn btn-brand py-2" type="submit">
              <i class="bi bi-box-arrow-in-right me-2"></i>Log In
            </button>
          </div>
        </form>
        <hr class="my-4">
        <p class="text-center text-muted small mb-0">
          Don't have an account?
          <a href="{% url 'register' %}" class="fw-500">Sign Up Free</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
