{% extends "blog/base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">
    <div class="auth-card card">
      <div class="card-body text-center py-5">

        <div class="mb-4" style="font-size:3rem; color:var(--brand);">
          <i class="bi bi-envelope-check"></i>
        </div>
        <h4 class="fw-700 mb-2">Check your inbox</h4>
        <p class="text-muted mb-4">
          If an account exists for that email address, we've sent a password reset link.
          The link will expire in <strong>1 hour</strong>.
        </p>
        <p class="text-muted small mb-4">
          Didn't receive it? Check your spam folder, or
          <a href="{% url 'password_reset' %}">try again</a>.
        </p>
        <a href="{% url 'login' %}" class="btn btn-outline-brand">
          <i class="bi bi-arrow-left me-1"></i>Back to Login
        </a>

      </div>
    </div>
  </div>
</div>
{% endblock content %}
